<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FLAC Sync Player</title>

  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    #cover { width: 200px; border-radius: 10px; }
    #seekSlider { width: 80%; margin-top: 10px; }
  </style>
</head>
<body>

<h2>Music Sync</h2>
<div id="roleLabel">Connecting...</div>

<img id="cover">
<h3 id="title"></h3>
<p id="artist"></p>

<audio id="player"></audio>

<div>
  <button id="play" onclick="play()">Play</button>
  <button id="pause" onclick="pause()">Pause</button>
  <button id="repeat" onclick="toggleRepeat()">Repeat: OFF</button>
</div>

<input type="range" id="seekSlider" min="0" max="0" step="0.1">
<div>
  <span id="currentTime">0:00</span> /
  <span id="duration">0:00</span>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
